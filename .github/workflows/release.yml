name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is on main
        run: git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'

  build:
    needs: check-branch
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-linux-musl
            name: linux-x86_64
          - target: aarch64-linux-musl
            name: linux-aarch64
          - target: x86_64-macos-none
            name: macos-x86_64
          - target: aarch64-macos-none
            name: macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

      - name: Package
        run: |
          cd zig-out/bin
          tar czf ../../bees-${{ matrix.name }}.tar.gz bees

      - uses: actions/upload-artifact@v4
        with:
          name: bees-${{ matrix.name }}
          path: bees-${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes bees-*.tar.gz
